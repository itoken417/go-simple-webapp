<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>500 - Internal Server Error</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1e1e2e; color: #cdd6f4; font-family: monospace; padding: 32px; }
    h1 { color: #f38ba8; font-size: 1.6rem; margin-bottom: 16px; }
    .label { color: #a6adc8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .box { background: #181825; border-left: 4px solid #f38ba8; padding: 16px; border-radius: 4px; margin-bottom: 24px; }
    .stack { background: #181825; border-left: 4px solid #6c7086; padding: 16px; border-radius: 4px; overflow-x: auto; white-space: pre; font-size: 0.82rem; line-height: 1.6; color: #bac2de; }
  </style>
</head>
<body>
  <h1>500 - Internal Server Error</h1>
  <div class="label">Error</div>
  <div class="box">{{ .Error }}</div>
  <div class="label">Stack Trace</div>
  <div class="stack">{{ .Stack }}</div>
</body>
</html>
