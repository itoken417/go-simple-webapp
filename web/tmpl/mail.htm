<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>メール送信</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input[type=text], textarea { width: 100%; padding: 6px; box-sizing: border-box; }
    textarea { height: 160px; resize: vertical; }
    button { margin-top: 12px; padding: 8px 24px; }
    .result { margin-top: 20px; padding: 12px; background: #f0f4ff; border-left: 4px solid #4466cc; }
    .error  { margin-top: 20px; padding: 12px; background: #fff0f0; border-left: 4px solid #cc4444; }
  </style>
</head>
<body>
  <h1>メール送信</h1>

  {{if .Result}}
  <div class="result">{{.Result}}</div>
  {{end}}
  {{if .Error}}
  <div class="error">{{.Error}}</div>
  {{end}}

  <form method="POST" action="/mail">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label>件名
      <input type="text" name="subject" value="{{.Subject}}" placeholder="件名を入力してください">
    </label>
    <label>本文
      <textarea name="body" placeholder="本文を入力してください">{{.Body}}</textarea>
    </label>
    <button type="submit">送信</button>
  </form>
</body>
</html>
